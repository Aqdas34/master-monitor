name: Deploy MasterMonitorServer

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Ensure parent directory exists and is writable
            sudo mkdir -p /var/www/globalalertz
            sudo chown -R $USER:$USER /var/www/globalalertz
            
            # 2. Sync code
            if [ ! -d "/var/www/globalalertz/MasterMonitorServer/.git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }} /var/www/globalalertz/MasterMonitorServer
            fi
            
            cd /var/www/globalalertz/MasterMonitorServer
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Handle Virtual Environment
            if [ ! -d "venv" ]; then
              echo "Creating virtual environment..."
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # 4. Handle Systemd Service
            echo "Updating and restarting service..."
            sudo cp mm_server.service /etc/systemd/system/mm_server.service
            sudo systemctl daemon-reload
            sudo systemctl enable mm_server.service
            sudo systemctl restart mm_server.service
