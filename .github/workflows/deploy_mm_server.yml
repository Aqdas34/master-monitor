name: Deploy MasterMonitorServer

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Sync code to home directory
            if [ ! -d "~/MasterMonitorServer/.git" ]; then
              echo "Cloning repository to home directory..."
              git clone https://github.com/${{ github.repository }} ~/MasterMonitorServer
            fi
            
            cd ~/MasterMonitorServer
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Handle Virtual Environment
            if [ ! -d "venv" ]; then
              echo "Creating virtual environment..."
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # 3. Handle Systemd User Service (No sudo needed!)
            echo "Updating and restarting user service..."
            mkdir -p ~/.config/systemd/user/
            cp mm_server.service ~/.config/systemd/user/mm_server.service
            
            systemctl --user daemon-reload
            systemctl --user enable mm_server.service
            systemctl --user restart mm_server.service
